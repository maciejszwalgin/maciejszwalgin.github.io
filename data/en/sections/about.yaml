# a summary about you
summary: |
  Team Leader and Software Engineer with 19 years of experience in the area of analysis, design, 
  and development of software.
  
  I have DevOps and Agile mindset. I appreciate people who are: open, honest, and transparent. 
  I am a person who can work individually and in a team, but the most important value is responsibility 
  and ownership for the effects of my and my teamwork. I have a creative mindset, I always try to share my ideas 
  with others and listen to others to choose the best approach and solution. 
  
  ---------------------------------------------
  
  My leadership mottos:
  - With good people you can move mountains – people are the most important
  - Good leaders help people to grow – they should be better than a leader
  
  Other Mottos:
  - DevOps should not be a job title - it is mindset :-)
  - Agile is more than a method - it's a mindset ;-)

